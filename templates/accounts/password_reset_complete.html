{% extends 'base.html' %}
{% block title %}Password Reset Complete | GRIHA{% endblock %}

{% block extra_css %}
<style>
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 2rem; }
    .auth-card { background: rgba(15, 15, 15, 0.85); border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border-radius: 16px; padding: 4rem 3rem; width: 100%; max-width: 500px; text-align: center; }
    .auth-card h2 { font-family: 'Cinzel', serif; color: #fff; font-size: 2.2rem; margin-bottom: 1rem; }
    .auth-card p { color: #ccc; line-height: 1.6; margin-bottom: 2rem; }
    .icon-container { display: inline-flex; align-items: center; justify-content: center; width: 80px; height: 80px; border-radius: 50%; background: rgba(76, 175, 80, 0.1); color: #4CAF50; margin-bottom: 1.5rem; }
    .btn-gold { display: inline-block; background: linear-gradient(135deg, #d4af37, #ffd700); color: #000; border: none; padding: 14px 28px; font-size: 1rem; font-weight: 700; border-radius: 8px; text-decoration: none; text-transform: uppercase; transition: transform 0.3s; }
    .btn-gold:hover { transform: translateY(-2px); }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="icon-container">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>
        <h2>Password Updated</h2>
        <p>Your password has been successfully reset. You can now log in with your new credentials.</p>
        <a href="{% url 'login' %}" class="btn-gold">Sign In</a>
    </div>
</div>
{% endblock %}
