{% extends 'base.html' %}
{% block title %}Verification Failed | GRIHA{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 2rem;
    }
    .auth-card {
        background: rgba(15, 15, 15, 0.85);
        border: 1px solid rgba(255, 87, 87, 0.2);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(20px);
        border-radius: 16px;
        padding: 4rem 3rem;
        width: 100%;
        max-width: 500px;
        text-align: center;
        animation: fadeIn 0.8s ease;
    }
    .auth-card h2 {
        font-family: 'Cinzel', serif;
        color: #fff;
        font-size: 2.2rem;
        margin-bottom: 1rem;
        letter-spacing: 1px;
    }
    .auth-card p {
        color: #ccc;
        line-height: 1.6;
        margin-bottom: 2rem;
        font-size: 1rem;
    }
    .icon-container {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(255, 87, 87, 0.1);
        color: #ff6b6b;
        margin-bottom: 1.5rem;
    }
    .btn-outline-gold {
        display: inline-block;
        background: transparent;
        color: #d4af37;
        border: 1px solid #d4af37;
        padding: 12px 24px;
        font-size: 0.95rem;
        font-weight: 600;
        border-radius: 8px;
        text-decoration: none;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .btn-outline-gold:hover {
        background: rgba(212, 175, 55, 0.1);
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="icon-container">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
        </div>
        <h2>Verification Failed</h2>
        <p>The verification link is invalid or has expired.</p>
        
        <a href="{% url 'resend_verification' %}" class="btn-outline-gold">Resend Verification Email</a>
    </div>
</div>
{% endblock %}
