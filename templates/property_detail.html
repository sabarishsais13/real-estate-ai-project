{% extends 'base.html' %}
{% load static %}

{% block title %}{{ property.title }} | GRIHA{% endblock %}

{% block extra_css %}<link rel="stylesheet" href="{% static 'css/pages/property_detail.css' %}">{% endblock %}

{% block content %}
<div id="property-container">
    <div class="property-loading">
        Loading property details...
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const propId = {{ property_id|default:0 }};
    const propertyPageUrl = "{{ property_url|escapejs }}";
    const API_BASE_URL = window.location.origin;
    const isAuthenticated = {% if user.is_authenticated %}true{% else %}false{% endif %};

    async function fetchProperty() {
        if (!propId) return;
        try {
            const res = await fetch(`${API_BASE_URL}/api/properties/${propId}/`);
            if (!res.ok) throw new Error("Not found");
            const data = await res.json();
            renderProperty(data);
        } catch(e) {
            document.getElementById('property-container').innerHTML = `
                <div class="property-not-found">
                    <h2>Property Not Found</h2>
                    <p>The requested property could not be loaded.</p>
                </div>
            `;
        }
    }

    function renderProperty(p) {
        const bgImg = p.image_url || p.image || 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1600';
        
        // Mock AI Data based on price/bhk
        const affordabilityScore = Math.floor(Math.random() * 20) + 75; // 75-94
        const suitability = p.bhk.includes('3') || p.bhk.includes('4') ? 'Family Residence' : 'Investment / Single Professional';
        const saveBtn = isAuthenticated
            ? `<form method="POST" action="/accounts/saved/${p.id}/toggle/" class="save-form">{% csrf_token %}<button class="btn btn-outline btn-full">Save Property</button></form>`
            : `<a class="btn btn-outline save-login-link" href="/accounts/login/">Login to Save</a>`;
        
        const html = `
        <div class="property-hero property-hero-dynamic" data-bg="${bgImg}">
            <div class="property-hero-content">
                <div>
                    <h1 class="property-title">${p.title}</h1>
                    <div class="property-location">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                            <circle cx="12" cy="9" r="2.5" fill="none"/>
                        </svg>
                        ${p.location}
                    </div>
                </div>
                <div class="property-action-row">
                    <div class="property-price">${p.price}</div>
                    <button type="button" class="copy-link-btn" onclick="copyPropertyLink()" aria-label="Copy property link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 1H5a2 2 0 0 0-2 2v12"/>
                            <path d="M8 5h9a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/>
                        </svg>
                        Copy Link
                    </button>
                </div>
            </div>
        </div>

        <div class="detail-grid">
            <div class="main-info">
                <div class="glass-card info-panel mb-medium">
                    <h2>Property Overview</h2>
                    <div class="specs-grid">
                        <div class="spec-item">
                            <div class="spec-label">Type</div>
                            <div class="spec-value">${p.type}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Bedrooms</div>
                            <div class="spec-value">${p.bhk}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Area</div>
                            <div class="spec-value">${p.area || 'N/A'}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Floor</div>
                            <div class="spec-value">${p.floor || 'N/A'}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Facing</div>
                            <div class="spec-value">${p.facing || 'N/A'}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Status</div>
                            <div class="spec-value">Ready to Move</div>
                        </div>
                    </div>
                    
                    <div class="description-text">
                        ${p.description || 'Experience unparalleled luxury in this exquisite property, designed with meticulous attention to detail and offering breathtaking views.'}
                    </div>
                    
                    <h3>Amenities</h3>
                    <div class="description-text">
                        ${p.amenities || 'Smart Home System, Infinity Pool, Private Gym, Dedicated Parking, 24/7 Concierge'}
                    </div>
                </div>
                
                <div class="virtual-tour-promo">
                    <h2 class="virtual-tour-title">Immersive 360° Experience</h2>
                    <p class="virtual-tour-subtitle">Step inside and explore every detail of this property with our interactive virtual tour powered by WebVR.</p>
                    <a href="/virtual-tour/${p.id}/" class="btn btn-filled">Launch Virtual Tour</a>
                </div>
            </div>

            <div class="sidebar">
                <div class="glass-card ai-panel">
                    <h2>AI Insights <span class="ai-insight-sparkle">✦</span></h2>
                    
                    <div class="ai-score-wrap">
                        <div class="score-circle">${affordabilityScore}%</div>
                        <div class="spec-label">Match Score</div>
                    </div>
                    
                    <div class="ai-recommendation-item">
                        <div class="ai-label">Best Suited For</div>
                        <div class="ai-reco-value">${suitability}</div>
                    </div>
                    
                    <div class="ai-recommendation-item">
                        <div class="ai-label">Investment Rating</div>
                        <div class="ai-reco-value">High Yield Potential (8.5% YoY)</div>
                    </div>
                    
                    <div class="ai-recommendation-item">
                        <div class="ai-label">Vastu Compliance</div>
                        <div class="ai-reco-value">${p.facing === 'East' || p.facing === 'North' ? 'High Compliance' : 'Moderate (Adaptable)'}</div>
                    </div>
                    
                    <div class="ai-actions">
                        <button class="btn btn-outline btn-full">Contact Agent</button>
                        ${saveBtn}
                    </div>
                </div>
            </div>
        </div>
        `;
        document.getElementById('property-container').innerHTML = html;
        const hero = document.querySelector('.property-hero-dynamic');
        if (hero) {
            hero.style.background = `url('${bgImg}') center/cover no-repeat`;
        }
    }

    function copyPropertyLink() {
        if (!navigator.clipboard) {
            alert('Copy not supported in this browser.');
            return;
        }

        navigator.clipboard.writeText(propertyPageUrl)
            .then(() => {
                let toast = document.querySelector('.copy-toast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.className = 'copy-toast';
                    toast.textContent = 'Link Copied!';
                    document.body.appendChild(toast);
                }
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1800);
            })
            .catch(() => {
                alert('Unable to copy link. Please try again.');
            });
    }

    document.addEventListener('DOMContentLoaded', fetchProperty);
</script>
{% endblock %}
