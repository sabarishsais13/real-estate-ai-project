{% extends 'base.html' %}

{% block title %}{{ property.title }} | EstateVista AI{% endblock %}

{% block extra_css %}
<style>
.property-hero {
    position: relative;
    height: 60vh;
    background: url('{{ property.image }}') center/cover no-repeat;
    display: flex;
    align-items: flex-end;
    padding: 0 5% var(--spacing-medium) 5%;
}

.property-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, transparent, rgba(11,11,11,1));
    z-index: 1;
}

.property-hero-content {
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
}

.property-title {
    font-size: 48px;
    margin-bottom: 10px;
}

.property-location {
    font-size: 18px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 10px;
}

.property-price {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    color: var(--highlight-gold);
    font-weight: 700;
}

.detail-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: var(--spacing-medium);
    padding: var(--spacing-medium) 5%;
}

.info-panel h2, .ai-panel h2 {
    color: var(--luxury-gold);
    margin-bottom: var(--spacing-small);
    border-bottom: 1px solid var(--gold-border);
    padding-bottom: 15px;
    font-family: 'Playfair Display', serif;
}

.specs-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: var(--spacing-medium);
}

.spec-item {
    background: rgba(255,255,255,0.03);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
}

.spec-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
}

.spec-value {
    font-size: 18px;
    color: var(--text-primary);
    font-weight: 600;
}

.description-text {
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: var(--spacing-medium);
}

/* AI Panel Styling */
.ai-panel {
    border-color: rgba(212, 175, 55, 0.4);
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
}

.score-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid var(--luxury-gold);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: 700;
    color: var(--highlight-gold);
    margin: 0 auto var(--spacing-small) auto;
    font-family: 'Playfair Display', serif;
}

.ai-recommendation-item {
    margin-bottom: 15px;
}

.ai-label {
    color: var(--luxury-gold);
    font-size: 14px;
}

.virtual-tour-promo {
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(255, 215, 0, 0.05) 100%);
    border: 1px solid var(--luxury-gold);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    margin-top: var(--spacing-medium);
}

@media (max-width: 900px) {
    .detail-grid { grid-template-columns: 1fr; }
    .property-hero-content { flex-direction: column; align-items: flex-start; gap: 20px; }
}
</style>
{% endblock %}

{% block content %}
<div id="property-container">
    <div style="padding: 100px; text-align: center; color: var(--text-muted);">
        Loading property details...
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const propId = {{ property_id|default:0 }};
    const API_BASE_URL = window.location.origin;

    async function fetchProperty() {
        if (!propId) return;
        try {
            const res = await fetch(`${API_BASE_URL}/api/properties/${propId}/`);
            if (!res.ok) throw new Error("Not found");
            const data = await res.json();
            renderProperty(data);
        } catch(e) {
            document.getElementById('property-container').innerHTML = `
                <div style="padding: 100px; text-align: center; color: #ff6b6b;">
                    <h2>Property Not Found</h2>
                    <p>The requested property could not be loaded.</p>
                </div>
            `;
        }
    }

    function renderProperty(p) {
        const bgImg = p.image || 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1600';
        
        // Mock AI Data based on price/bhk
        const affordabilityScore = Math.floor(Math.random() * 20) + 75; // 75-94
        const suitability = p.bhk.includes('3') || p.bhk.includes('4') ? 'Family Residence' : 'Investment / Single Professional';
        
        const html = `
        <div class="property-hero" style="background-image: url('${bgImg}');">
            <div class="property-hero-content">
                <div>
                    <h1 class="property-title">${p.title}</h1>
                    <div class="property-location">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                            <circle cx="12" cy="9" r="2.5" fill="none"/>
                        </svg>
                        ${p.location}
                    </div>
                </div>
                <div class="property-price">${p.price}</div>
            </div>
        </div>

        <div class="detail-grid">
            <div class="main-info">
                <div class="glass-card info-panel mb-medium">
                    <h2>Property Overview</h2>
                    <div class="specs-grid">
                        <div class="spec-item">
                            <div class="spec-label">Type</div>
                            <div class="spec-value">${p.type}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Bedrooms</div>
                            <div class="spec-value">${p.bhk}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Area</div>
                            <div class="spec-value">${p.area || 'N/A'}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Floor</div>
                            <div class="spec-value">${p.floor || 'N/A'}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Facing</div>
                            <div class="spec-value">${p.facing || 'N/A'}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Status</div>
                            <div class="spec-value">Ready to Move</div>
                        </div>
                    </div>
                    
                    <div class="description-text">
                        ${p.description || 'Experience unparalleled luxury in this exquisite property, designed with meticulous attention to detail and offering breathtaking views.'}
                    </div>
                    
                    <h3>Amenities</h3>
                    <div class="description-text">
                        ${p.amenities || 'Smart Home System, Infinity Pool, Private Gym, Dedicated Parking, 24/7 Concierge'}
                    </div>
                </div>
                
                <div class="virtual-tour-promo">
                    <h2 style="color:var(--luxury-gold); margin-bottom:15px; font-family:'Playfair Display', serif;">Immersive 360° Experience</h2>
                    <p style="margin-bottom: 25px; color:var(--text-secondary);">Step inside and explore every detail of this property with our interactive virtual tour powered by WebVR.</p>
                    <a href="/virtual-tour/${p.id}/" class="btn btn-filled">Launch Virtual Tour</a>
                </div>
            </div>

            <div class="sidebar">
                <div class="glass-card ai-panel">
                    <h2>AI Insights <span style="font-size:12px;">✦</span></h2>
                    
                    <div style="text-align:center; margin: 30px 0;">
                        <div class="score-circle">${affordabilityScore}%</div>
                        <div class="spec-label">Match Score</div>
                    </div>
                    
                    <div class="ai-recommendation-item">
                        <div class="ai-label">Best Suited For</div>
                        <div style="color:white; font-weight:500;">${suitability}</div>
                    </div>
                    
                    <div class="ai-recommendation-item">
                        <div class="ai-label">Investment Rating</div>
                        <div style="color:white; font-weight:500;">High Yield Potential (8.5% YoY)</div>
                    </div>
                    
                    <div class="ai-recommendation-item">
                        <div class="ai-label">Vastu Compliance</div>
                        <div style="color:white; font-weight:500;">${p.facing === 'East' || p.facing === 'North' ? 'High Compliance' : 'Moderate (Adaptable)'}</div>
                    </div>
                    
                    <div style="margin-top:30px;">
                        <button class="btn btn-outline" style="width:100%; padding:12px;">Contact Agent</button>
                    </div>
                </div>
            </div>
        </div>
        `;
        document.getElementById('property-container').innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', fetchProperty);
</script>
{% endblock %}
