{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}GRIHA | Premium Real Estate Platform{% endblock %}</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/glass.css' %}">
<link rel="stylesheet" href="{% static 'css/animations.css' %}">

<style>
/* ================= CHATBOT ================= */

.vastu-chatbot {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 300px;
    z-index: 1000;
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s ease;
}

.chatbot-header {
    background: rgba(212, 175, 55, 0.2);
    padding: 12px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    cursor: grab;
}

.chatbot-body {
    display: none;
    flex-direction: column;
    background: rgba(0,0,0,0.85);
    height: 150px;
}

#chatMessages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    font-size: 13px;
}

.chat-input {
    display: flex;
    border-top: 1px solid gold;
}

#vastu-query {
    flex: 1;
    padding: 8px;
    background: transparent;
    border: none;
    color: white;
}

.chat-input button {
    background: gold;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
}

/* Floating Button */
.open-chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: gold;
    border: none;
    padding: 12px 16px;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
}

/* Smooth animation */
.chatbot-body.show {
    display: flex;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

{% block extra_css %}{% endblock %}
</head>

<body>

<canvas id="particle-canvas"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="{% url 'home' %}" class="logo">GRIHA</a>
    <ul class="nav-links">
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'discover' %}">Discover</a></li>
        <li><a href="{% url 'sell' %}">Sell</a></li>
        <li><a href="{% url 'ai_advisor' %}">AI Advisor</a></li>
    </ul>
    <a href="{% url 'discover' %}" class="btn btn-outline">Get Started</a>
</nav>

<main class="main-content" style="margin-top:70px;">
{% block content %}{% endblock %}
</main>

<footer class="section" style="text-align:center; padding:40px;">
<p>&copy; 2026 GRIHA</p>
</footer>



<!-- CHATBOT -->
<div id="chatbot" class="vastu-chatbot glass-card">

    <div class="chatbot-header" id="chatHeader">
        <span>Vastu AI Guide</span>
        <span onclick="toggleChat()">✖</span>
    </div>

    <div class="chatbot-body" id="chatBody">

        <div id="chatMessages"></div>

        <div class="chat-input">
            <input id="vastu-query" placeholder="Ask Vastu..." />
            <button onclick="askVastu()">Send</button>
        </div>

    </div>
</div>

<script>

/* ================= CHAT ================= */

function toggleChat(){
    document.getElementById("chatBody").classList.toggle("show");
}

/* ENTER KEY SUPPORT */
document.getElementById("vastu-query").addEventListener("keypress", function(e){
    if(e.key === "Enter") askVastu();
});

/* CSRF */
function getCSRFToken(){
    const name = 'csrftoken';
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

/* ASK BOT */
function askVastu(){
    let input = document.getElementById("vastu-query");
    let chat = document.getElementById("chatMessages");
    let msg = input.value.trim();
    
    if(!msg) return;

    // Display user message
    let userMsgDiv = document.createElement('p');
    userMsgDiv.innerHTML = `<b>You:</b> ${msg}`;
    chat.appendChild(userMsgDiv);
    chat.scrollTop = chat.scrollHeight;

    // Clear input
    input.value = "";

    // Send to backend
    const csrfToken = getCSRFToken();
    
    fetch("/vastu-chat/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken || ""
        },
        body: JSON.stringify({query: msg})
    })
    .then(res => {
        if (!res.ok) {
            return res.json().then(data => {
                throw new Error(data.error || 'Server error');
            });
        }
        return res.json();
    })
    .then(data => {
        let botMsgDiv = document.createElement('p');
        botMsgDiv.innerHTML = `<b>Bot:</b> ${data.response || 'Sorry, I could not answer that.'}`;
        chat.appendChild(botMsgDiv);
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(error => {
        console.error('Vastu Chat Error:', error);
        let botMsgDiv = document.createElement('p');
        botMsgDiv.innerHTML = `<b>Bot:</b> Sorry, I could not answer that. (${error.message})`;
        chat.appendChild(botMsgDiv);
        chat.scrollTop = chat.scrollHeight;
    });
}

/* ================= DRAG ONLY HEADER ================= */

const chatbot = document.getElementById("chatbot");
const header = document.getElementById("chatHeader");

let isDragging = false, offsetX, offsetY;

header.addEventListener("mousedown", e => {
    isDragging = true;
    offsetX = e.clientX - chatbot.offsetLeft;
    offsetY = e.clientY - chatbot.offsetTop;
});

document.addEventListener("mousemove", e => {
    if(isDragging){
        chatbot.style.left = (e.clientX - offsetX) + "px";
        chatbot.style.top = (e.clientY - offsetY) + "px";
        chatbot.style.bottom = "auto";
        chatbot.style.right = "auto";
    }
});

document.addEventListener("mouseup", () => isDragging = false);

</script>

{% block extra_js %}{% endblock %}
</body>
</html>
